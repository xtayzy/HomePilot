server {
  listen 80;
  server_name unicrew.kz www.unicrew.kz;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 80;
  server_name 89.207.255.213;
  return 301 https://unicrew.kz$request_uri;
}

server {
  listen 443 ssl http2;
  server_name unicrew.kz www.unicrew.kz;

  ssl_certificate /etc/letsencrypt/live/unicrew.kz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/unicrew.kz/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8001/api/;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # OpenAPI / Swagger / ReDoc (FastAPI)
  location = /openapi.json {
    proxy_pass http://backend:8001/openapi.json;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /docs {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /redoc {
    proxy_pass http://backend:8001;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /openapi-assets/ {
    proxy_pass http://backend:8001/openapi-assets/;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://backend:8001/uploads/;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://backend:8001/health;
    proxy_http_version 1.1;
    proxy_connect_timeout 15s;
    proxy_read_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
