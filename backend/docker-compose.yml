services:
  db:
    image: postgres:16-alpine
    container_name: homepilot-db
    command: ["postgres", "-p", "5433"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homepilot
    ports:
      - "15432:5433"   # хост 15432 → контейнер 5433 (в контейнере слушаем 5433, чтобы не конфликтовать с другими проектами)
    volumes:
      - homepilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5433 -U postgres -d homepilot"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: homepilot-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5433/homepilot
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5433/homepilot
      SECRET_KEY: change-me-in-production-min-32-chars
      PORT: "8001"
      UPLOAD_DIR: /app/uploads
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads

volumes:
  homepilot_pgdata:
